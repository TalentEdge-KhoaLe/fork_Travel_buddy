name: Sync with Upstream

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # Checkout your fork repository
      - name: Checkout the repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.UPSTREAM_TOKEN }} # Use the secret token for authentication

      # Set up Git user for commit purposes
      - name: Set up Git
        run: |
          git config --global user.name "TalentEdge-Khoa Le"
          git config --global user.email "khoa.le@talentedge.ai"

      # Add the upstream repository
      - name: Add upstream repository
        env:
          UPSTREAM_URL: https://github.com/talentedgeai/travel-buddy-prj.git
        run: |
          git remote add upstream https://${{ secrets.UPSTREAM_TOKEN }}@${{ env.UPSTREAM_URL }}
          git fetch upstream

      # Merge changes from the upstream repository
      - name: Merge upstream changes
        run: |
          git checkout main
          git merge --no-edit upstream/main || echo "Merge conflicts detected; manual resolution required."

      # Push changes to the fork repository
      - name: Push changes to fork
        env:
          REPO_URL: https://github.com/TalentEdge-KhoaLe/fork_Travel_buddy.git
        run: |
          git push https://${{ secrets.UPSTREAM_TOKEN }}@${{ env.REPO_URL }} main
